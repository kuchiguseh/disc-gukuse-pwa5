<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f97316">
<!-- キャッシュ無効化 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>DISC別口ぐせ診断</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --coral: #f97316;
    --coral-light: #fed7aa;
    --coral-dark: #c2410c;
    --teal: #0d9488;
    --teal-light: #99f6e4;
    --purple: #7c3aed;
    --purple-light: #ede9fe;
    --pink: #db2777;
    --pink-light: #fce7f3;
    --sky: #0284c7;
    --sky-light: #e0f2fe;
    --green: #16a34a;
    --green-light: #dcfce7;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --font-main: 'Noto Sans JP', sans-serif;
    --font-display: 'Zen Maru Gothic', sans-serif;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-main);
    background: #fff8f5;
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* ======================== SCREENS ======================== */
  .screen { display: none !important; }
  .screen.active { display: block !important; }
  #screen-top.active, #screen-name.active { display: flex !important; }

  /* ======================== TOP SCREEN ======================== */
  #screen-top {
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: linear-gradient(160deg, #fff8f5 0%, #fef3e2 50%, #fde8d8 100%);
    position: relative;
    overflow: hidden;
  }

  #screen-top::before {
    content: '';
    position: absolute;
    top: -100px; right: -100px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }

  #screen-top::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -80px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(13,148,136,0.10) 0%, transparent 70%);
    border-radius: 50%;
  }

  .top-inner {
    position: relative; z-index: 1;
    max-width: 480px; width: 100%;
    text-align: center;
  }

  .top-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: white;
    border: 2px solid var(--coral-light);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 13px; font-weight: 700;
    color: var(--coral-dark);
    margin-bottom: 24px;
    letter-spacing: 0.05em;
  }

  .top-title {
    font-family: var(--font-display);
    font-size: clamp(28px, 7vw, 42px);
    font-weight: 900;
    color: var(--gray-900);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .top-title span { color: var(--coral); }

  .top-subtitle {
    font-size: 15px;
    color: var(--gray-600);
    margin-bottom: 36px;
    line-height: 1.7;
  }

  .disc-types {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 36px;
  }

  .disc-type-card {
    background: white;
    border-radius: 12px;
    padding: 14px;
    text-align: left;
    box-shadow: var(--shadow);
    border-left: 4px solid;
    transition: transform 0.2s;
  }

  .disc-type-card:hover { transform: translateY(-2px); }
  .disc-type-card.d { border-color: #ef4444; }
  .disc-type-card.i { border-color: #f59e0b; }
  .disc-type-card.s { border-color: #10b981; }
  .disc-type-card.c { border-color: #3b82f6; }

  .disc-type-card .label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.1em; margin-bottom: 4px;
  }

  .disc-type-card.d .label { color: #ef4444; }
  .disc-type-card.i .label { color: #f59e0b; }
  .disc-type-card.s .label { color: #10b981; }
  .disc-type-card.c .label { color: #3b82f6; }

  .disc-type-card .name {
    font-size: 14px; font-weight: 700;
    color: var(--gray-800); margin-bottom: 2px;
  }

  .disc-type-card .phrase {
    font-size: 11px; color: var(--gray-500);
  }

  .btn-start {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(135deg, var(--coral), #fb923c);
    color: white;
    border: none; border-radius: 100px;
    padding: 18px 48px;
    font-size: 17px; font-weight: 700;
    font-family: var(--font-display);
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(249,115,22,0.35);
    transition: all 0.25s;
    width: 100%; max-width: 320px;
    letter-spacing: 0.05em;
  }

  .btn-start:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(249,115,22,0.45);
  }

  .top-note {
    margin-top: 16px;
    font-size: 15px; color: var(--gray-600); font-weight: 600;
  }

  .copyright {
    text-align: center; font-size: 14px; color: var(--gray-600);
    font-weight: 600;
    padding: 20px; margin-top: 8px;
  }

  /* ======================== QUIZ SCREEN ======================== */
  #screen-quiz {
    min-height: 100vh;
    background: linear-gradient(160deg, #fff8f5 0%, #fef3e2 100%);
    padding: 0 0 40px;
  }

  .quiz-header {
    background: white;
    padding: 20px 20px 0;
    border-bottom: 1px solid var(--gray-100);
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  .quiz-header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }

  .quiz-app-name {
    font-size: 14px; font-weight: 700; color: var(--coral);
    font-family: var(--font-display);
  }

  .quiz-progress-text {
    font-size: 13px; font-weight: 600; color: var(--gray-600);
  }

  .progress-bar-track {
    height: 6px; background: var(--gray-100);
    border-radius: 100px; overflow: hidden;
    margin-bottom: 12px;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--coral), #fb923c);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .quiz-body {
    padding: 32px 20px 0;
    max-width: 540px; margin: 0 auto;
  }

  .question-num {
    font-size: 15px; font-weight: 700;
    color: var(--coral); letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 14px;
  }

  .question-text {
    font-size: clamp(20px, 5vw, 26px);
    font-weight: 700; line-height: 1.6;
    color: var(--gray-900); margin-bottom: 28px;
    font-family: var(--font-display);
  }

  .choices { display: flex; flex-direction: column; gap: 12px; }

  .choice-btn {
    display: flex; align-items: center; gap: 14px;
    background: white;
    border: 2px solid var(--gray-200);
    border-radius: 14px; padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left; width: 100%;
    font-family: var(--font-main);
  }

  .choice-btn:hover {
    transform: translateX(4px);
    filter: brightness(0.97);
    box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  }

  .choice-btn.selected {
    transform: translateX(6px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    filter: brightness(0.95);
  }

  .choice-letter {
    width: 32px; height: 32px;
    background: var(--gray-100);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: var(--gray-500);
    font-family: 'Georgia', 'Times New Roman', serif;
    font-style: italic;
    flex-shrink: 0; margin-top: 1px;
    transition: all 0.2s;
    letter-spacing: 0;
  }

  .choice-btn.selected .choice-letter {
    background: var(--coral); color: white;
  }

  .choice-content .choice-label {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; margin-bottom: 4px;
  }

  .choice-content .choice-text {
    font-size: 16px; color: var(--gray-700); line-height: 1.6;
    font-weight: 500;
  }

  /* ======================== NAME INPUT SCREEN ======================== */
  #screen-name {
    min-height: 100vh;
    background: linear-gradient(160deg, #fff8f5 0%, #fef3e2 100%);
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }

  .name-card {
    background: white; border-radius: 24px;
    padding: 40px 32px; max-width: 440px; width: 100%;
    box-shadow: var(--shadow-lg); text-align: center;
  }

  .name-icon {
    font-size: 52px; margin-bottom: 16px;
  }

  .name-title {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 700;
    color: var(--gray-900); margin-bottom: 8px;
  }

  .name-desc {
    font-size: 14px; color: var(--gray-500);
    margin-bottom: 28px; line-height: 1.7;
  }

  .name-input {
    width: 100%; padding: 14px 18px;
    border: 2px solid var(--gray-200);
    border-radius: 12px; font-size: 16px;
    font-family: var(--font-main); font-weight: 500;
    outline: none; transition: border-color 0.2s;
    margin-bottom: 20px; text-align: center;
  }

  .name-input:focus { border-color: var(--coral); }

  .btn-result {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, var(--coral), #fb923c);
    color: white; border: none; border-radius: 100px;
    padding: 16px 40px; font-size: 16px; font-weight: 700;
    font-family: var(--font-display); cursor: pointer;
    width: 100%; box-shadow: 0 6px 20px rgba(249,115,22,0.3);
    transition: all 0.25s; letter-spacing: 0.05em;
  }

  .btn-result:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(249,115,22,0.4); }

  /* ======================== RESULT SCREEN ======================== */
  #screen-result {
    min-height: 100vh;
    background: #ffffff;
    padding-bottom: 60px;
  }

  .result-actions {
    display: none; /* 上部ボタンは使わない */
  }

  /* 下部アクションボタン（前アプリと同じスタイル） */
  .bottom-actions {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 24px 20px 40px;
    flex-wrap: wrap;
  }

  .btn-action {
    display: flex; align-items: center; justify-content: center;
    padding: 12px 22px;
    border-radius: 100px;
    font-size: 14px; font-weight: 700;
    font-family: var(--font-display);
    cursor: pointer; transition: all 0.2s;
    white-space: nowrap;
    text-decoration: none;
  }

  .btn-action.share {
    background: #c084fc; color: white; border: none;
    box-shadow: 0 4px 12px rgba(192,132,252,0.4);
  }

  .btn-action.save {
    background: white; color: #ec4899;
    border: 2px solid #ec4899;
  }

  .btn-action.retry {
    background: white; color: #ec4899;
    border: 2px solid #ec4899;
  }

  .btn-action:hover { transform: translateY(-2px); opacity: 0.9; }

  .btn-pdf { display: none; }
  .btn-retry { display: none; }

  /* SNS Share Area */
  .share-area {
    max-width: 820px; margin: 0 auto 40px; padding: 0 20px;
  }

  .share-title {
    text-align: center; font-size: 14px; font-weight: 700;
    color: var(--gray-600); margin-bottom: 12px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .share-title::before, .share-title::after {
    content: ''; flex: 1; height: 1px; background: var(--gray-200);
  }

  .share-buttons {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-share {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    border: none; border-radius: 12px;
    padding: 14px 16px; font-size: 14px; font-weight: 700;
    font-family: var(--font-display); cursor: pointer;
    transition: all 0.2s; text-decoration: none; color: white;
  }

  .btn-share:hover { transform: translateY(-2px); filter: brightness(1.1); }
  .btn-share.x     { background: #000000; }
  .btn-share.line  { background: #06C755; }
  .btn-share.fb    { background: #1877F2; }
  .btn-share.ig    { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

  /* PDF preview area */
  #pdf-preview {
    max-width: 820px; margin: 24px auto; padding: 0 20px;
    background: #ffffff;
  }

  /* ======================== PDF REPORT STYLES ======================== */
  .report-page {
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    font-size: 14px;
    line-height: 1.7;
  }

  /* Header */
  .rpt-header {
    background: linear-gradient(135deg, #e8734a 0%, #d4603a 100%);
    padding: 20px 28px;
    display: flex; align-items: flex-start; justify-content: space-between;
  }

  .rpt-header-left {}

  .rpt-title-main {
    font-size: 22px; font-weight: 900; color: white;
    font-family: var(--font-display); letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .rpt-title-sub {
    font-size: 11px; color: rgba(255,255,255,0.85);
    margin-top: 4px; letter-spacing: 0.05em;
  }

  .rpt-header-right { text-align: right; }

  .rpt-date {
    font-size: 11px; color: rgba(255,255,255,0.85);
    margin-bottom: 4px;
  }

  .rpt-name {
    font-size: 16px; font-weight: 700; color: white;
    font-family: var(--font-display);
  }

  /* Type banner */
  .rpt-type-banner {
    border: 2px solid var(--gray-200);
    margin: 20px 20px 0;
    border-radius: 12px; padding: 16px 20px;
    background: #fafafa;
  }

  .rpt-type-label {
    font-size: 11px; font-weight: 600;
    color: var(--gray-500); letter-spacing: 0.1em; margin-bottom: 6px;
  }

  .rpt-type-name {
    font-size: 26px; font-weight: 900;
    font-family: var(--font-display);
    margin-bottom: 6px;
  }

  .rpt-type-desc {
    font-size: 13px; color: var(--gray-600); line-height: 1.6;
  }

  /* Section */
  .rpt-section {
    margin: 14px 20px 0;
  }

  .rpt-section-title {
    font-size: 12px; font-weight: 700; color: white;
    letter-spacing: 0.08em; padding: 8px 14px;
    border-radius: 8px 8px 0 0;
    background: #6b8fa3;
  }

  .rpt-section-body {
    border: 1px solid var(--gray-200);
    border-top: none; border-radius: 0 0 8px 8px;
    padding: 14px;
    background: white;
  }

  /* Score bars */
  .score-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 8px;
  }

  .score-row:last-child { margin-bottom: 0; }

  .score-label {
    font-size: 12px; font-weight: 700;
    width: 60px; flex-shrink: 0; color: var(--gray-700);
  }

  .score-bar-bg {
    flex: 1; height: 16px; background: var(--gray-100);
    border-radius: 100px; overflow: hidden;
  }

  .score-bar-fill {
    height: 100%; border-radius: 100px;
    transition: width 1s cubic-bezier(0.4,0,0.2,1);
    min-width: 4px;
  }

  .score-count {
    font-size: 12px; font-weight: 700;
    width: 28px; text-align: right; color: var(--gray-700);
  }

  /* Tags */
  .tags-row {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .tag {
    padding: 6px 14px; border-radius: 100px;
    font-size: 13px; font-weight: 700;
    font-family: var(--font-display);
  }

  /* Prescription */
  .presc-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--gray-100);
  }

  .presc-row:last-child { border-bottom: none; }

  .presc-from {
    font-size: 12px; font-weight: 600; color: var(--gray-700);
    flex: 1; background: var(--gray-50); padding: 6px 10px; border-radius: 6px;
  }

  .presc-arrow {
    font-size: 14px; color: var(--coral); flex-shrink: 0;
  }

  .presc-to {
    font-size: 12px; font-weight: 600; color: var(--gray-800);
    flex: 1.3; background: #f0fdf4; padding: 6px 10px; border-radius: 6px;
    border-left: 3px solid #10b981;
  }

  /* Affirmations grid */
  .affirm-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
  }

  .affirm-card {
    background: var(--gray-50); border-radius: 8px; padding: 12px;
    text-align: center;
  }

  .affirm-main {
    font-size: 12px; font-weight: 700; color: var(--gray-800);
    line-height: 1.5; margin-bottom: 6px;
  }

  .affirm-ex {
    font-size: 10px; color: var(--gray-500); line-height: 1.5;
  }

  /* Scene + practice */
  .two-col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }

  .scene-item {
    margin-bottom: 10px;
  }

  .scene-item:last-child { margin-bottom: 0; }

  .scene-tag {
    display: inline-block;
    background: #dbeafe; color: #1d4ed8;
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 100px; margin-bottom: 4px;
  }

  .scene-main {
    font-size: 12px; font-weight: 600; color: var(--gray-800);
    line-height: 1.5; margin-bottom: 2px;
  }

  .scene-ex {
    font-size: 10px; color: var(--gray-500);
  }

  .practice-list { list-style: none; }

  .practice-list li {
    font-size: 12px; padding: 6px 0;
    border-bottom: 1px solid var(--gray-100);
    color: var(--gray-700); line-height: 1.5;
    padding-left: 16px; position: relative;
  }

  .practice-list li:last-child { border-bottom: none; }

  .practice-list li::before {
    content: '✓'; position: absolute; left: 0;
    color: var(--teal); font-weight: 700; font-size: 11px;
  }

  /* DISC info */
  .disc-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }

  .disc-card {
    border-radius: 8px; padding: 12px;
    border: 1px solid var(--gray-200);
  }

  .disc-card-title {
    font-size: 13px; font-weight: 700; margin-bottom: 6px;
  }

  .disc-card-body {
    font-size: 11px; color: var(--gray-600); line-height: 1.6;
  }

  .disc-card.d { background: #fef2f2; border-color: #fca5a5; }
  .disc-card.d .disc-card-title { color: #dc2626; }
  .disc-card.i { background: #fffbeb; border-color: #fcd34d; }
  .disc-card.i .disc-card-title { color: #d97706; }
  .disc-card.s { background: #f0fdf4; border-color: #86efac; }
  .disc-card.s .disc-card-title { color: #16a34a; }
  .disc-card.c { background: #eff6ff; border-color: #93c5fd; }
  .disc-card.c .disc-card-title { color: #2563eb; }

  /* Profile footer */
  .rpt-footer {
    margin: 14px 20px 20px;
    border: 1px solid var(--gray-200); border-radius: 10px;
    overflow: hidden;
    display: grid; grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 0;
  }

  .rpt-footer-photo {
    padding: 16px;
    background: var(--gray-50);
    border-right: 1px solid var(--gray-200);
  }

  .rpt-footer-photo img {
    width: 90px; height: 90px;
    border-radius: 50%; object-fit: cover;
    object-position: top center;
    display: block;
    border: 3px solid white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  .rpt-footer-info {
    padding: 14px 16px;
  }

  .rpt-footer-role {
    font-size: 12px; font-weight: 700; color: var(--coral);
    letter-spacing: 0.08em; margin-bottom: 4px;
  }

  .rpt-footer-seminar {
    font-size: 13px; font-weight: 600; color: var(--gray-800);
    margin-bottom: 4px;
  }

  .rpt-footer-schedule {
    font-size: 12px; color: var(--gray-500);
  }

  .rpt-footer-qr {
    padding: 16px;
    text-align: center;
    border-left: 1px solid var(--gray-200);
    background: var(--gray-50);
  }

  .rpt-footer-qr img {
    width: 100px; height: 100px;
    display: block;
  }

  .rpt-footer-qr-label {
    font-size: 10px; color: var(--gray-500); margin-top: 4px;
  }

  .rpt-footer-btn {
    display: inline-flex; align-items: center;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

    <div class="question-text slide-in">${q.text}</div>
    <div class="choices" id="choices">
      ${shuffled.map((c, i) => {
        const col = choiceColors[i];
        return `
        <button class="choice-btn" onclick="selectChoice(this, '${c.type}')"
          style="border-color:${col.border}20; background:${col.bg};"
          data-bg="${col.bg}" data-border="${col.border}">
          <div class="choice-content">
            <div class="choice-text">${c.text}</div>
          </div>
        </button>`;
      }).join('')}
    </div>
  `;

  selectedChoice = null;
}

function selectChoice(btn, type) {
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedChoice = type;

  if (tiebreakMode) {
    tiebreakScores[type] = (tiebreakScores[type] || 0) + 1;
  } else {
    scores[type]++;
  }

  setTimeout(() => {
    if (tiebreakMode) {
      tiebreakQ++;
      const tiedStill = getTiedTypes();
      if (tiebreakQ < tiebreakMax && tiedStill.length >= 2) {
        renderTiebreakQuestion(tiedStill);
      } else {
        showScreen('name');
        document.getElementById('user-name').focus();
      }
    } else {
      currentQ++;
      if (currentQ < questions.length) {
        renderQuestion();
      } else {
        const tied = getInitialTiedTypes();
        if (tied.length >= 2) {
          tiebreakMode = true;
          tiebreakQ = 0;
          tiebreakTypes = tied;
          tiebreakScores = {};
          tied.forEach(t => { tiebreakScores[t] = 0; });
          renderTiebreakQuestion(tied);
        } else {
          showScreen('name');
          document.getElementById('user-name').focus();
        }
      }
    }
  }, 350);
}

function getInitialTiedTypes() {
  const maxScore = Math.max(...Object.values(scores));
  return Object.entries(scores).filter(([,v]) => v === maxScore).map(([k]) => k);
}

function getTiedTypes() {
  const maxScore = Math.max(...Object.values(tiebreakScores));
  return Object.entries(tiebreakScores).filter(([,v]) => v === maxScore).map(([k]) => k);
}

function determineFinalType() {
  if (!tiebreakMode) {
    return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  }
  const tbMax = Math.max(...Object.values(tiebreakScores));
  const tbWinners = Object.entries(tiebreakScores).filter(([,v]) => v === tbMax).map(([k]) => k);
  if (tbWinners.length === 1) return tbWinners[0];
  // それでも同点なら元スコアが高い方
  return tbWinners.sort((a, b) => (scores[b] || 0) - (scores[a] || 0))[0];
}

function getTiebreakKey(types) {
  return [...types].sort().join('-');
}

function renderTiebreakQuestion(tiedTypes) {
  const key = getTiebreakKey(tiedTypes);
  const pool = tiebreakQuestions[key];
  let q;

  if (pool && pool.length > tiebreakQ) {
    q = pool[tiebreakQ];
  } else if (pool && pool.length > 0) {
    q = pool[0];
  } else {
    // 2タイプに絞ってフォールバック
    const pair = tiedTypes.slice(0, 2);
    const fallbackPool = tiebreakQuestions[getTiebreakKey(pair)];
    q = fallbackPool ? fallbackPool[tiebreakQ % fallbackPool.length] : null;
    if (!q) {
      showScreen('name');
      document.getElementById('user-name').focus();
      return;
    }
  }

  document.getElementById('progress-text').textContent = `追加質問`;
  document.getElementById('progress-bar').style.width = '100%';

  const shuffled = shuffle(q.choices);
  const container = document.getElementById('question-container');
  container.innerHTML = `
    <div class="question-num slide-in" style="color:#7c3aed; font-size:13px">✨ タイプを絞り込む追加質問</div>
    <div class="question-text slide-in">${q.text}</div>
    <div class="choices" id="choices">
      ${shuffled.map((c, i) => {
        const col = choiceColors[i % choiceColors.length];
        return `<button class="choice-btn" onclick="selectChoice(this, '${c.type}')"
          style="border-color:${col.border}20; background:${col.bg};">
          <div class="choice-content">
            <div class="choice-text">${c.text}</div>
          </div>
        </button>`;
      }).join('')}
    </div>
  `;
  selectedChoice = null;
}

function debugTiebreak(tiedTypes) {
  currentQ = 0;
  selectedChoice = null;
  tiebreakMode = false;
  tiebreakQ = 0;
  tiebreakTypes = [];
  tiebreakScores = {};

  // スコアをセット
  if (JSON.stringify(tiedTypes.sort()) === JSON.stringify(['D','I','S'])) {
    scores = { D: 3, I: 3, S: 3, C: 1 };
  } else if (JSON.stringify(tiedTypes.sort()) === JSON.stringify(['D','I'])) {
    scores = { D: 5, I: 5, S: 0, C: 0 };
  } else {
    scores = { D: 0, I: 0, S: 0, C: 0 };
    tiedTypes.forEach(t => { scores[t] = 3; });
  }

  // 追加質問フロー開始
  tiebreakMode = true;
  tiebreakQ = 0;
  tiebreakTypes = tiedTypes;
  tiebreakScores = {};
  tiedTypes.forEach(t => { tiebreakScores[t] = 0; });

  showScreen('quiz');
  renderTiebreakQuestion(tiedTypes);
}

function shareResult() {
  var dominantType = determineFinalType();
  var td = typeData[dominantType];
  var appUrl = 'https://kuchiguseh.github.io/disc-gukuse-pwa4/';
  var shareText = 'DiSC別口ぐせ診断をやってみました！\n私のタイプは「' + td.name + '」でした✨\nあなたのタイプも診断してみてください👇\n' + appUrl;

  if (navigator.share) {
    navigator.share({ title: 'DiSC別口ぐせ診断', text: shareText, url: appUrl });
  } else {
    var encoded = encodeURIComponent(shareText);
    window.open('https://twitter.com/intent/tweet?text=' + encoded, '_blank');
  }
}

function saveAsImage() {
  var btn = document.querySelector('.btn-action.save');
  var origText = btn.textContent;
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;

  var target = document.getElementById('pdf-preview');
  var sns = target.querySelector('.sns-share-block');
  if (sns) sns.style.display = 'none';

  // 全ての親要素の背景を白に固定
  var screenResult = document.getElementById('screen-result');
  var origScreenBg = screenResult.style.background;
  var origBodyBg = document.body.style.background;
  var origTargetBg = target.style.background;
  screenResult.style.background = '#ffffff';
  document.body.style.background = '#ffffff';
  target.style.background = '#ffffff';

  html2canvas(target, {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#ffffff',
    logging: false,
    removeContainer: false,
    scrollX: 0,
    scrollY: 0,
    x: 0,
    y: 0
  }).then(function(canvas) {
    screenResult.style.background = origScreenBg;
    document.body.style.background = origBodyBg;
    target.style.background = origTargetBg;
    if (sns) sns.style.display = '';

    var isSmartphone = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isSmartphone) {
      var imgData = canvas.toDataURL('image/png');
      document.getElementById('modal-img').src = imgData;
      document.getElementById('img-modal').style.display = 'block';
      document.getElementById('img-modal').scrollTop = 0;
    } else {
      canvas.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.download = 'kuchiguse-report.png';
        link.href = url;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        setTimeout(function() {
          document.body.removeChild(link);
          URL.revokeObjectURL(url);
        }, 1000);
      }, 'image/png');
    }

    btn.textContent = origText;
    btn.disabled = false;
  }).catch(function(err) {
    console.error(err);
    screenResult.style.background = origScreenBg;
    document.body.style.background = origBodyBg;
    target.style.background = origTargetBg;
    if (sns) sns.style.display = '';
    btn.textContent = origText;
    btn.disabled = false;
    alert('画像の生成に失敗しました。もう一度お試しください。');
  });
}

function restartQuiz() {
  startQuiz();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}
